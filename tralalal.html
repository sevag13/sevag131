<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>knock knock</title>
  <style>
    html,body{height:100%;margin:0}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#111;color:#fff;font-family:system-ui,Segoe UI,Roboto,Arial}
    .container{max-width:1100px;padding:20px;text-align:center}
    img{max-width:100%;height:auto;border-radius:6px;box-shadow:0 8px 24px rgba(0,0,0,0.6)}
    .ip{color:red;font-size:2.25rem;font-weight:700;margin-top:18px}
    .note{color:#bbb;font-size:0.9rem;margin-top:6px}
  </style>
</head>
<body>
  <div class="container">
    <img src="IMG-1958.png" alt="pizza is coming"/>

    <div id="ip" class="ip">IP: [fetching...]</div>
  </div>

  <script>
    // Fetch the visitor's public IP using a public service and show it in red
    // Note: this runs in the visitor's browser and returns their public IP address.
    document.addEventListener('DOMContentLoaded', async () => {
      const ipEl = document.getElementById('ip');
      try {
        const res = await fetch('https://api.ipify.org?format=json');
        if (!res.ok) throw new Error('network');
        const data = await res.json();
        ipEl.textContent = 'IP: ' + data.ip;
      } catch (err) {
        // If the fetch fails, fall back to a redacted joke message.
        ipEl.textContent = 'IP: [REDACTED]';
      }
    });
  </script>
</body>
</html>
